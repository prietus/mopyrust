name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: ''
            rust-target: ''
          - platform: macos-latest
            target: '--target aarch64-apple-darwin'
            rust-target: 'aarch64-apple-darwin'
          - platform: windows-latest
            target: ''
            rust-target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend deps
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'mopyrust ${{ github.ref_name }}'
          releaseBody: |
            Native Mopidy client for desktop.

            **Linux:** install via AUR (`mopyrust-bin`) or use the `.deb` / `.AppImage` directly.
            **macOS:** download the `.dmg` (Apple Silicon). Right-click → Open the first time.
            **Windows:** download the `.msi`. Click "More info" → "Run anyway" if SmartScreen appears.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.target }}
